name: Apply crafting workflow v6

on:
  pull_request:
    branches:
      - feature/crafting-workflow-final

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply workflow patch
        shell: bash
        run: |
          rm -f scripts/v6_patch_error.log
          if grep -q 'function AdminCraftReviewModal' pages/items.js; then
            echo 'Crafting workflow v6 already applied.'
          else
            set +e
            python3 scripts/apply_crafting_workflow_v6.py > /tmp/v6-patch.log 2>&1
            code=$?
            set -e
            if [ $code -ne 0 ]; then
              cp /tmp/v6-patch.log scripts/v6_patch_error.log
              cat /tmp/v6-patch.log
            fi
          fi
          if [ ! -f scripts/v6_patch_error.log ]; then
            python3 scripts/fix_v6_receipts.py
          fi
      - name: Install dependencies
        run: npm install --silent
      - name: Build production bundle
        shell: bash
        run: |
          if [ -f scripts/v6_patch_error.log ]; then
            echo 'Skipping build because patch application failed.'
            exit 0
          fi
          set +e
          npx next build > scripts/v6_build_error.log 2>&1
          code=$?
          set -e
          tail -n 300 scripts/v6_build_error.log
          if [ $code -eq 0 ]; then
            rm scripts/v6_build_error.log
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-key
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: streamline smithing and craft approvals"
          branch: ${{ github.head_ref }}
          file_pattern: "pages/items.js scripts/v6_patch_error.log scripts/v6_build_error.log"
