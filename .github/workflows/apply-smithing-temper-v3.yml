name: Apply smithing temper v3

on:
  pull_request:
    branches:
      - feature/crafting-workflow-final

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply final Smithing result calculations
        id: patch
        shell: bash
        continue-on-error: true
        run: |
          base64 --decode scripts/smithing_temper_v3_finalize.b64 > /tmp/smithing_temper_v3_finalize.py
          set -o pipefail
          python3 /tmp/smithing_temper_v3_finalize.py 2>&1 | tee smithing-temper-v3-patch.log

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smithing-temper-v3-patch-log
          path: smithing-temper-v3-patch.log

      - name: Stop after patch failure
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Install dependencies
        run: npm install --silent

      - name: Build production bundle
        shell: bash
        run: |
          set +e
          npx next build > /tmp/smithing-temper-v3-build.log 2>&1
          code=$?
          tail -n 200 /tmp/smithing-temper-v3-build.log
          exit $code
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-key

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: finalize smithing result calculations"
          branch: ${{ github.head_ref }}
          file_pattern: "pages/items.js"
