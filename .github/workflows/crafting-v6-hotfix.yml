name: Validate crafting v6 hotfix

on:
  pull_request:
    branches:
      - feature/crafting-workflow-final

permissions:
  contents: write

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply guarded hotfix
        shell: bash
        run: |
          rm -f scripts/crafting_v6_hotfix_error.log
          if grep -q 'function recipeWithSmithingResult' pages/items.js; then
            echo 'Crafting hotfix already applied.'
          else
            python3 scripts/fix_crafting_v6_hotfix_script.py
            set +e
            python3 scripts/patch_crafting_v6_hotfix.py > /tmp/crafting-v6-hotfix.log 2>&1
            code=$?
            set -e
            if [ $code -ne 0 ]; then
              cp /tmp/crafting-v6-hotfix.log scripts/crafting_v6_hotfix_error.log
              cat /tmp/crafting-v6-hotfix.log
            fi
          fi
      - name: Install and build
        shell: bash
        run: |
          if [ -f scripts/crafting_v6_hotfix_error.log ]; then
            echo 'Skipping build because the guarded patch failed.'
            exit 0
          fi
          npm install --silent
          npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-key
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: handle virtual smithing stock and concrete elemental damage"
          branch: ${{ github.head_ref }}
          file_pattern: "pages/items.js scripts/crafting_v6_hotfix_error.log"
