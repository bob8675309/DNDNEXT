name: Capture NPC page bake

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/capture-npc-page-bake.yml"

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/patch_npc_page_sheet_controls_final_v1.mjs
      - run: |
          grep -Fq 'import NpcPanel from "../components/NpcPanel";' pages/npcs.js
          grep -Fq 'supabase.rpc("delete_character_v1"' pages/npcs.js
          grep -Fq 'initialView={profilePanelInitialView}' pages/npcs.js
      - uses: actions/upload-artifact@v4
        with:
          name: baked-npcs-page
          path: pages/npcs.js
