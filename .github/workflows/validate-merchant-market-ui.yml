name: Validate merchant market UI

on:
  push:
    branches:
      - feature/crafting-workflow-final
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee merchant-market-build.log
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merchant-market-build-log
          path: merchant-market-build.log
          if-no-files-found: warn
