name: Apply enchanting tempering materials

on:
  pull_request:
    branches:
      - feature/enchanting-tempering-materials

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply guarded source patch
        run: python3 scripts/apply_enchanting_tempering_materials.py
      - name: Install dependencies
        run: npm install --silent
      - name: Build production bundle
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-key
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: add enchanting filters, fantasy materials, and elemental tempering"
          branch: ${{ github.head_ref }}
          file_pattern: "pages/items.js"
