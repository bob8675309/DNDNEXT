name: Apply enchanting tempering materials

on:
  push:
    branches:
      - automation/enchanting-tempering-materials-run-2
  pull_request:
    branches:
      - feature/enchanting-tempering-materials

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/enchanting-tempering-materials-run-2
      - name: Preserve JavaScript regex escapes in patch replacements
        run: sed -i 's/re.subn(pattern, replacement, text/re.subn(pattern, lambda _match: replacement, text/' scripts/apply_enchanting_tempering_materials.py
      - name: Apply guarded source patch
        run: python3 scripts/apply_enchanting_tempering_materials.py
      - name: Install dependencies
        run: npm install --silent
      - name: Build production bundle
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-key
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: add enchanting filters, fantasy materials, and elemental tempering"
          branch: automation/enchanting-tempering-materials-run-2
          file_pattern: "pages/items.js"
