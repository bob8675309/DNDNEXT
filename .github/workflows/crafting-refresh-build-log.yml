name: Crafting refresh build log

on:
  pull_request:
    branches:
      - feature/crafting-workflow-refresh

jobs:
  build-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/apply_crafting_workflow_refresh.py
      - run: npm install --silent
      - name: Run production build
        shell: bash
        run: npx next build > crafting-build.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crafting-build-log
          path: crafting-build.log
