name: Extract CraftingWorkspace Phase 1

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/extract-crafting-workspace-phase1.yml"
      - "scripts/extract_crafting_workspace_phase1.mjs"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Extract workspace
        run: node scripts/extract_crafting_workspace_phase1.mjs
      - name: Validate extraction
        run: |
          test -f components/CraftingWorkspace.js
          grep -Fq 'export default function CraftingWorkspace' components/CraftingWorkspace.js
          grep -Fq 'import CraftingWorkspace from "../components/CraftingWorkspace"' pages/items.js
          grep -Fq 'components", "CraftingWorkspace.js"' scripts/patch_enchanting_bounds_v1.mjs
          node scripts/patch_enchanting_bounds_v1.mjs
          npx next build
      - name: Commit extraction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/items.js components/CraftingWorkspace.js scripts/patch_enchanting_bounds_v1.mjs
          if git diff --cached --quiet; then
            echo "No extraction changes to commit."
            exit 0
          fi
          git commit -m "Extract crafting workspace component phase 1"
          git push origin main

# Triggered once by ChatGPT to apply the phase-1 extraction.
