name: Export clean crafting source

on:
  pull_request:
    branches:
      - feature/crafting-materials-v2

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: clean-crafting-source
          path: pages/items.js
