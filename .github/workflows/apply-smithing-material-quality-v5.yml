name: Apply smithing material quality v5

on:
  pull_request:
    branches:
      - feature/crafting-workflow-final

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply smithing material quality patch
        shell: bash
        run: |
          if grep -q 'function smithingQualityVariant' pages/items.js; then
            echo 'Smithing material quality patch is already applied.'
          else
            python3 scripts/smithing_material_quality_v5.py
          fi

      - name: Install dependencies
        run: npm install --silent

      - name: Build production bundle
        shell: bash
        run: |
          set +e
          npx next build > /tmp/smithing-material-quality-v5-build.log 2>&1
          code=$?
          tail -n 250 /tmp/smithing-material-quality-v5-build.log
          exit $code
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-key

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: add Normal and HQ smithing materials"
          branch: ${{ github.head_ref }}
          file_pattern: "pages/items.js"
