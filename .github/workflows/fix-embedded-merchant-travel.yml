name: Fix embedded merchant travel tools

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fix-embedded-merchant-travel.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch embedded merchant shop travel controls
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function replaceOnce(source, before, after, label) {
            if (source.includes(after)) return source;
            const count = source.split(before).length - 1;
            if (count !== 1) throw new Error(`${label}: expected one match, found ${count}`);
            return source.replace(before, after);
          }

          const merchantPath = 'components/MerchantPanel.js';
          let merchant = fs.readFileSync(merchantPath, 'utf8');
          merchant = replaceOnce(
            merchant,
            '  onBackToProfile,\n}) {',
            '  onBackToProfile,\n  showTravelTools = true,\n}) {',
            'MerchantPanel showTravelTools prop'
          );
          merchant = replaceOnce(
            merchant,
            '          {/* Admin Travel & routes toggle button */}\n          {isAdmin && (',
            '          {/* Admin Travel & routes toggle button */}\n          {isAdmin && showTravelTools && (',
            'MerchantPanel travel button guard'
          );
          merchant = replaceOnce(
            merchant,
            '        {/* Slide-out Travel & routes panel (admin only) */}\n        {isAdmin && (',
            '        {/* Slide-out Travel & routes panel (admin only) */}\n        {isAdmin && showTravelTools && (',
            'MerchantPanel travel panel guard'
          );
          fs.writeFileSync(merchantPath, merchant, 'utf8');

          const npcPath = 'components/NpcPanel.js';
          let npc = fs.readFileSync(npcPath, 'utf8');
          npc = replaceOnce(
            npc,
            '        <MerchantPanel merchant={view} isAdmin={isAdmin} locations={locations} onBackToProfile={() => setActiveView("profile")} />',
            '        <MerchantPanel merchant={view} isAdmin={isAdmin} locations={locations} showTravelTools={false} onBackToProfile={() => setActiveView("profile")} />',
            'NpcPanel embedded shop travel guard'
          );
          fs.writeFileSync(npcPath, npc, 'utf8');
          NODE

      - name: Validate source markers
        run: |
          grep -Fq 'showTravelTools = true' components/MerchantPanel.js
          grep -Fq 'isAdmin && showTravelTools && (' components/MerchantPanel.js
          test "$(grep -F 'isAdmin && showTravelTools && (' components/MerchantPanel.js | wc -l)" -eq 2
          grep -Fq 'showTravelTools={false}' components/NpcPanel.js

      - name: Validate direct production build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: validation-placeholder
        run: npx next build

      - name: Commit embedded shop fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/MerchantPanel.js components/NpcPanel.js
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Hide travel controls in embedded merchant shops"
          git push origin main

# Triggered once by ChatGPT to apply the embedded shop travel fix.
