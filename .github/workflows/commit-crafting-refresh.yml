name: Commit crafting refresh output

on:
  pull_request:
    branches:
      - feature/crafting-workflow-refresh

permissions:
  contents: write

jobs:
  commit-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/crafting-refresh-run
      - run: python3 scripts/apply_crafting_workflow_refresh.py
      - name: Normalize styled JSX placement
        run: python3 -c 'from pathlib import Path; p=Path("pages/items.js"); t=p.read_text(); m="        /* Crafting workflow themes and compact-card overflow protection */"; s=t.index(m); e=t.rfind("</style>"); c=t.rfind("    `}",0,s); b=t[s:e].rstrip(); p.write_text(t[:c]+b+"\n\n    `}"+t[e:])'
      - run: npm install --silent
      - run: npx next build
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: restore themed crafting workflows and town access"
          branch: automation/crafting-refresh-run
          file_pattern: "pages/items.js components/TownSheet.js styles/globals.scss"
