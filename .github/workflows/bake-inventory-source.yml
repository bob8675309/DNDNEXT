name: Bake inventory source

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/bake-inventory-source.yml"

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply inventory equipment transformer once
        run: node scripts/patch_inventory_equipment_diagram_v1.mjs

      - name: Remove inventory equipment transformer from package hooks
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const target = 'node scripts/patch_inventory_equipment_diagram_v1.mjs';
          for (const key of ['predev', 'prebuild']) {
            const raw = String(pkg.scripts?.[key] || '');
            pkg.scripts[key] = raw.split(/\s*&&\s*/).filter((part) => part && part !== target).join(' && ');
            if (pkg.scripts[key].includes(target)) throw new Error(`${key} still contains ${target}`);
          }
          fs.writeFileSync(path, JSON.stringify(pkg), 'utf8');
          NODE

      - name: Validate baked inventory markers
        run: |
          grep -Fq 'import EquipmentDiagram, { EQUIPMENT_SLOTS, inferEquipmentSlot } from "@/components/EquipmentDiagram";' pages/inventory.js
          grep -Fq 'supabase.rpc("list_item_send_targets_v1"' pages/inventory.js
          grep -Fq 'async function assignEquipSlot' pages/inventory.js
          grep -Fq 'supabase.rpc("transfer_inventory_item_v1"' pages/inventory.js
          grep -Fq '<EquipmentDiagram' pages/inventory.js
          grep -Fq 'onAssignEquipSlot={assignEquipSlot}' pages/inventory.js
          grep -Fq 'equipment-slot-picker' pages/inventory.js
          ! grep -Fq 'patch_inventory_equipment_diagram_v1.mjs' package.json

      - name: Validate direct production build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: validation-placeholder
        run: npx next build

      - name: Commit baked source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/inventory.js package.json
          if git diff --cached --quiet; then
            echo "No baked source changes to commit."
            exit 0
          fi
          git commit -m "Bake inventory equipment controls into source"
          git push origin main

# Triggered once by ChatGPT to bake the inventory source after workflow creation.
