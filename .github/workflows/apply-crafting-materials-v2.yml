name: Apply crafting materials v2

on:
  pull_request:
    branches:
      - feature/crafting-materials-v2

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply crafting materials phases
        run: |
          python3 scripts/crafting_materials_v2_phase1.py
          python3 scripts/crafting_materials_v2_phase2.py
          python3 scripts/crafting_materials_v2_phase3.py
          python3 scripts/crafting_materials_v2_phase4.py

      - name: Install dependencies
        run: npm install --silent

      - name: Build production bundle
        shell: bash
        run: |
          set +e
          npx next build > /tmp/crafting-materials-v2-build.log 2>&1
          code=$?
          tail -n 160 /tmp/crafting-materials-v2-build.log
          exit $code
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-key

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: implement enchanting filters and elemental tempering"
          branch: ${{ github.head_ref }}
          file_pattern: "pages/items.js"
