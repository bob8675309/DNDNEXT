name: Apply inventory ownership source patch

on:
  pull_request:
    branches:
      - feature/crafting-workflow-final
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.head_ref == 'inventory-hotfix-runner' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/crafting-workflow-final
          fetch-depth: 0

      - name: Patch inventory source
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('pages/inventory.js')
          text = path.read_text(encoding='utf-8')

          old = '''  // Load inventory
          useEffect(() => {
            if (!canView || !ownerType || ownerId == null) {
              setRows([]);
              setLoadingInv(false);
              return;
            }

            let cancelled = false;

            async function fetchInventory() {
              setLoadingInv(true);

              let q = supabase.from("inventory_items").select("*").order("created_at", { ascending: false });

              // Unified: inventory_items is the single source of truth for all owners.
              q = q.eq("owner_type", ownerType).eq("owner_id", ownerId);

              const { data, error } = await q;

              if (cancelled) return;

              if (error) {
                setErrorMsg(error.message || "Error loading inventory");
                setRows([]);
              } else {
                setRows(data || []);
              }

              setLoadingInv(false);
            }

            fetchInventory();

            // Realtime: filter only by owner_id (realtime filter supports single condition reliably)
            const channel = supabase
              .channel(`inventory-changes-${ownerType}-${ownerId}`)
              .on(
                "postgres_changes",
                { event: "*", schema: "public", table: "inventory_items", filter: `owner_id=eq.${ownerId}` },
                (payload) => {
                  const tNew = payload?.new?.owner_type;
                  const tOld = payload?.old?.owner_type;

                  // only refresh for this owner_type
                  if (tNew === ownerType || tOld === ownerType) fetchInventory();
                }
              )
              .subscribe();

            return () => {
              cancelled = true;
              supabase.removeChannel(channel);
            };
          }, [canView, ownerType, ownerId]);
          '''

          new = '''  const fetchInventory = useCallback(async () => {
            if (!canView || !ownerType || ownerId == null) {
              setRows([]);
              setLoadingInv(false);
              return;
            }

            setLoadingInv(true);

            let q = supabase.from("inventory_items").select("*").order("created_at", { ascending: false });

            // Player inventory ownership is keyed by the authenticated user UUID.
            // NPC and merchant inventories remain keyed by characters.id.
            if (ownerType === "player") {
              q = q.eq("user_id", ownerId).or("owner_type.is.null,owner_type.eq.player");
            } else {
              q = q.eq("owner_type", ownerType).eq("owner_id", ownerId);
            }

            const { data, error } = await q;

            if (error) {
              setErrorMsg(error.message || "Error loading inventory");
              setRows([]);
            } else {
              setErrorMsg("");
              setRows(data || []);
            }

            setLoadingInv(false);
          }, [canView, ownerType, ownerId]);

          // Load inventory and keep it synchronized with the ownership column used
          // by that owner type. Realtime supports one server-side filter reliably.
          useEffect(() => {
            if (!canView || !ownerType || ownerId == null) {
              setRows([]);
              setLoadingInv(false);
              return;
            }

            fetchInventory();

            const ownerColumn = ownerType === "player" ? "user_id" : "owner_id";
            const channel = supabase
              .channel(`inventory-changes-${ownerType}-${ownerId}`)
              .on(
                "postgres_changes",
                { event: "*", schema: "public", table: "inventory_items", filter: `${ownerColumn}=eq.${ownerId}` },
                (payload) => {
                  if (ownerType === "player") {
                    fetchInventory();
                    return;
                  }

                  const tNew = payload?.new?.owner_type;
                  const tOld = payload?.old?.owner_type;
                  if (tNew === ownerType || tOld === ownerType) fetchInventory();
                }
              )
              .subscribe();

            return () => {
              supabase.removeChannel(channel);
            };
          }, [canView, ownerType, ownerId, fetchInventory]);
          '''

          if text.count(old) != 1:
              raise SystemExit(f'Expected one inventory load block; found {text.count(old)}')
          load_items_count = text.count('await loadItems();')
          if load_items_count != 2:
              raise SystemExit(f'Expected two undefined loadItems calls; found {load_items_count}')

          text = text.replace(old, new, 1)
          text = text.replace('await loadItems();', 'await fetchInventory();')

          required = [
              'const fetchInventory = useCallback(async () => {',
              'q = q.eq("user_id", ownerId).or("owner_type.is.null,owner_type.eq.player");',
              'const ownerColumn = ownerType === "player" ? "user_id" : "owner_id";',
          ]
          for token in required:
              if token not in text:
                  raise SystemExit(f'Missing expected token: {token}')
          if 'loadItems' in text:
              raise SystemExit('Undefined loadItems reference remains')

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/apply-inventory-owner-hotfix.yml').unlink()
          PY

      - name: Validate and commit
        shell: bash
        run: |
          grep -q 'const fetchInventory = useCallback' pages/inventory.js
          grep -q 'q = q.eq("user_id", ownerId)' pages/inventory.js
          ! grep -q 'loadItems' pages/inventory.js
          test ! -f .github/workflows/apply-inventory-owner-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/inventory.js .github/workflows/apply-inventory-owner-hotfix.yml
          git commit -m "Fix player inventory refresh and ownership queries [inventory-hotfix]"
          git push origin HEAD:feature/crafting-workflow-final
