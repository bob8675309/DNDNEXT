name: Crafting refresh diagnostics

on:
  pull_request:
    branches:
      - feature/crafting-workflow-refresh

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: python3 scripts/apply_crafting_workflow_refresh.py
      - run: npm install --silent >/dev/null
      - name: Build with concise output
        shell: bash
        run: |
          set +e
          npx next build > /tmp/crafting-build.log 2>&1
          code=$?
          tail -n 80 /tmp/crafting-build.log
          exit $code
