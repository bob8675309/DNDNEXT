name: Apply verified crafting refresh

on:
  push:
    branches:
      - feature/crafting-workflow-refresh
    paths:
      - .github/workflows/apply-crafting-refresh.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/crafting-workflow-refresh
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: python3 scripts/apply_crafting_workflow_refresh.py
      - run: npm ci
      - run: npx next build
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: restore themed crafting workflows and town access"
          file_pattern: "pages/items.js components/TownSheet.js styles/globals.scss"
