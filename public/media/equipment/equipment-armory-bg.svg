<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06050a"/>
      <stop offset="0.44" stop-color="#151020"/>
      <stop offset="1" stop-color="#030207"/>
    </linearGradient>
    <radialGradient id="violet" cx="50%" cy="35%" r="48%">
      <stop offset="0" stop-color="#9b68ff" stop-opacity="0.42"/>
      <stop offset="0.35" stop-color="#59317d" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
