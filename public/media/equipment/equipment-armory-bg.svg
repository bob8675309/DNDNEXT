<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="stone" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07060b"/>
      <stop offset="0.42" stop-color="#16101e"/>
      <stop offset="1" stop-color="#050409"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="42%" r="56%">
      <stop offset="0" stop-color="#7b4fbd" stop-opacity="0.44"/>
      <stop offset="0.42" stop-color="#3a2355" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorGlow" cx="50%" cy="76%" r="38%">
      <stop offset="0" stop-color="#b88945" stop-opacity="0.23"/>
      <stop offset="0.48" stop-color="#6d4a9b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2.2"/></filter>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="12"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.10"/></feComponentTransfer></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#stone)"/>
  <rect width="1600" height="1000" filter="url(#rough)" opacity="0.75"/>
  <rect width="1600" height="1000" fill="url(#centerGlow)"/>
  <rect width="1600" height="1000" fill="url(#floorGlow)"/>

  <!-- vaulted rear wall -->
  <g opacity="0.88">
    <path d="M430 95c118-78 246-117 370-117s252 39 370 117v670H430z" fill="#0b0910" stroke="#2a2033" stroke-width="5"/>
    <path d="M510 165c92-66 190-99 290-99s198 33 290 99v575H510z" fill="#100b16" stroke="#332641" stroke-width="4"/>
    <path d="M585 240c68-45 140-68 215-68s147 23 215 68v473H585z" fill="#0a080e" stroke="#2f2540" stroke-width="3"/>
    <path d="M800 66v662M650 120c40 156 49 352 27 588M950 120c-40 156-49 352-27 588" stroke="#7d55b7" stroke-opacity="0.15" stroke-width="4"/>
    <path d="M608 365h384M575 520h450M545 690h510" stroke="#2c2234" stroke-width="4"/>
  </g>

  <!-- side alcoves and shelves -->
  <g opacity="0.86">
    <path d="M65 115c83-47 167-70 254-70h111v790H30V215c12-35 24-68 35-100z" fill="#07060a" stroke="#2f2630" stroke-width="5"/>
    <path d="M1535 115c-83-47-167-70-254-70h-111v790h400V215c-12-35-24-68-35-100z" fill="#07060a" stroke="#2f2630" stroke-width="5"/>
    <path d="M110 232h265M110 316h265M110 400h265M110 484h265M110 568h265M1225 232h265M1225 316h265M1225 400h265M1225 484h265M1225 568h265" stroke="#8a6131" stroke-opacity="0.42" stroke-width="9"/>
    <path d="M115 206h245M115 290h245M115 374h245M115 458h245M115 542h245M1240 206h245M1240 290h245M1240 374h245M1240 458h245M1240 542h245" stroke="#211a21" stroke-width="16"/>
  </g>

  <!-- weapon silhouettes -->
  <g opacity="0.52" stroke-linecap="round">
    <path d="M165 160v200M190 140v235M222 176v210M1382 160v200M1410 140v235M1442 176v210" stroke="#5d4c5b" stroke-width="5"/>
    <path d="M145 170l40-40 40 40M1370 170l40-40 40 40" fill="none" stroke="#65546a" stroke-width="4"/>
    <path d="M255 170l-28 80 56 0zM1320 170l-28 80 56 0z" fill="#17121a" stroke="#574664" stroke-width="4"/>
    <path d="M304 180c36 20 56 52 60 94M1296 180c-36 20-56 52-60 94" fill="none" stroke="#6a5663" stroke-width="6"/>
  </g>

  <!-- banners -->
  <g opacity="0.58">
    <path d="M560 95h70v300l-35-35-35 35zM970 95h70v300l-35-35-35 35z" fill="#26133a" stroke="#5c3d7f" stroke-width="3"/>
    <path d="M581 132h28M581 173h28M991 132h28M991 173h28" stroke="#b88945" stroke-opacity="0.30" stroke-width="3"/>
  </g>

  <!-- chains and hanging circle -->
  <g opacity="0.5" stroke-linecap="round">
    <path d="M200 0c17 62 27 116 30 161M1400 0c-17 62-27 116-30 161M700 0c8 56 11 112 8 168M900 0c-8 56-11 112-8 168" stroke="#211926" stroke-width="13"/>
    <path d="M690 35c72 54 148 54 220 0" fill="none" stroke="#211926" stroke-width="14"/>
    <circle cx="800" cy="72" r="82" fill="none" stroke="#3b2a4c" stroke-width="8"/>
    <path d="M800 8v128M736 72h128M756 28l88 88M844 28l-88 88" stroke="#5f3d88" stroke-opacity="0.48" stroke-width="3"/>
  </g>

  <!-- candles, lanterns, and side purple light -->
  <g opacity="0.70">
    <rect x="82" y="610" width="96" height="140" rx="18" fill="#120b0a" stroke="#3a241e" stroke-width="4"/>
    <rect x="1422" y="610" width="96" height="140" rx="18" fill="#120b0a" stroke="#3a241e" stroke-width="4"/>
    <circle cx="130" cy="600" r="16" fill="#d99b4a" filter="url(#blur)"/>
    <circle cx="1470" cy="600" r="16" fill="#8b4ce2" filter="url(#blur)"/>
    <path d="M124 625h12M1464 625h12" stroke="#ffd18a" stroke-opacity="0.58"/>
    <path d="M520 455h36M1044 455h36" stroke="#d99b4a" stroke-opacity="0.42" stroke-width="5"/>
    <circle cx="538" cy="438" r="22" fill="#d99b4a" opacity="0.18" filter="url(#blur)"/>
    <circle cx="1062" cy="438" r="22" fill="#8b4ce2" opacity="0.22" filter="url(#blur)"/>
  </g>

  <!-- rune floor -->
  <g opacity="0.82" fill="none">
    <ellipse cx="800" cy="780" rx="360" ry="96" stroke="#8b6c37" stroke-opacity="0.36" stroke-width="4"/>
    <ellipse cx="800" cy="780" rx="270" ry="70" stroke="#7b4fbd" stroke-opacity="0.28" stroke-width="3"/>
    <ellipse cx="800" cy="780" rx="168" ry="42" stroke="#d2a845" stroke-opacity="0.20" stroke-width="2"/>
    <path d="M800 684v190M705 780h190M800 712l78 68-78 68-78-68z" stroke="#d2a845" stroke-opacity="0.28" stroke-width="2"/>
    <path d="M530 812c134 44 314 64 540 0" stroke="#5c3d7f" stroke-opacity="0.20" stroke-width="3"/>
  </g>

  <!-- floor perspective -->
  <g opacity="0.38" stroke="#3b2c42" stroke-width="3">
    <path d="M0 865h1600M0 925h1600M0 985h1600"/>
    <path d="M600 720 360 1000M1000 720l240 280M720 720l-75 280M880 720l75 280"/>
  </g>

  <rect width="1600" height="1000" fill="#000" opacity="0.20"/>
  <rect width="1600" height="1000" fill="none" stroke="#1b1423" stroke-width="10"/>
</svg>
